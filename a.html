<!doctype html>
<html lang="en">
  <head>

    <title>하이</title>
    <link rel="stylesheet" href="style.css" />

    <section id="profile">
      <h2>😉프로필😉</h2>
      <div>
        <table>
          <tr>
            <th>이름</th>
            <td>홍길동</td>
          </tr>
          <tr>
            <th>나이</th>
            <td>20세</td>
          </tr>
          <tr>
            <th>주소</th>

          </tr>

    <section id="tmi">
      <h2>📝 TMI 📝</h2>
      <div class="tmi-container">
        <div class="tmi-card">
          <img class="tmi-img" src="./3 (2).jpg" alt="TMI 이미지" />

          <p><strong>이미지3</strong></p>
        </div>
      </div>
    </section>
    <section id="comment">
      <h2>코멘트</h2>
      <form>
        <input type="text" placeholder="코멘트를 입력하세요" />
        <button type="submit">등록</button>

    </section>
    <footer>
      <a href="https://www.naver.com" target="_blank">참고링크</a>

</html>
